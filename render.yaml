services:
  # Backend
  - type: web
    name: vethuko-backend
    env: python
    rootDir: college-platform
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10

  # Frontend
  - type: web
    name: vethuko-frontend
    env: static
    rootDir: college-frontend
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://vethuko-college.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
